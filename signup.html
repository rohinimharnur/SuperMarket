<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - Shri Balaji Supermarket</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#c61313,#ff9800);
  display:flex;
  justify-content:center;
  align-items:center;
}

.signup-box{
  background:#fff;
  width:340px;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

.signup-box h2{
  color:#c61313;
  margin-bottom:1.5rem;
}

.signup-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
}

.signup-box input:focus{
  outline:none;
  border-color:#c61313;
}

.signup-box button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#c61313;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.signup-box button:hover{
  background:#a50f0f;
}

.signup-box p{
  margin-top:1rem;
  font-size:14px;
}

.signup-box a{
  color:#c61313;
  text-decoration:none;
  font-weight:500;
}

.signup-box a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="signup-box">
  <h2>Create Account</h2>

  <form action="/signup" method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>

  <p>Already user? <a href="/login">Login</a></p>
</div>

<script>
async function signup() {
  const username = document.getElementById("su_user").value;
  const password = document.getElementById("su_pass").value;

  const res = await fetch("/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.text();
  alert(data);
}
</script>

</body>
</html>
